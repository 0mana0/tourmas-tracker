<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ツアマス カード出現順 記録</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { text-align: center; color: #2c3e50; }
    .controls { text-align: center; margin: 25px 0; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    select, button { padding: 10px 15px; font-size: 16px; margin: 5px; border-radius: 6px; }
    button { background: #3498db; color: white; border: none; cursor: pointer; }
    button:hover { background: #2980b9; }

    .section { margin: 35px 0; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .provider-name { font-size: 24px; font-weight: bold; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
    .card-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
    .card img { width: 100%; border-radius: 8px; margin-top: 10px; }
    .position { font-size: 21px; font-weight: bold; color: #e74c3c; }
  </style>
</head>
<body>
  <h1>ツアマス カード出現順 記録</h1>

  <div class="controls">
    <label>弾選択：</label>
    <select id="segment">
      <option value="1">第一弾</option>
      <option value="2">第二弾</option>
      <option value="3">第三弾</option>
      <option value="4">第四弾</option>
      <option value="5">第五弾</option>
    </select>
    
    <label><input type="radio" name="frame" value="N" checked> 通常枠</label>
    <label><input type="radio" name="frame" value="R"> R枠</label>
    
    <button onclick="loadData()">表示を更新</button>
  </div>

  <div id="result"></div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0dObXqhwdvRm0JObB56gVIby5kmWpqwT5TQGKvtTyQgcPq90rZVYokwUosAZvRJ-PABc8JbGW3N0z/pub?gid=0&single=true&output=csv";  // ← ここを変更！

    async function loadData() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = "<p>読み込み中...</p>";

      try {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            const data = results.data;
            const segment = document.getElementById('segment').value;
            const frame = document.querySelector('input[name="frame"]:checked').value;

            // フィルタリング
            const filtered = data.filter(row => 
              row.segment === segment && 
              row.frame === frame &&
              row.provider && row.position
            );

            // 提供者ごとにグループ化
            const grouped = {};
            filtered.forEach(row => {
              if (!grouped[row.provider]) {
                grouped[row.provider] = { name: row.provider, cards: [] };
              }
              grouped[row.provider].cards.push(row);
            });

            let html = `<h2 style="text-align:center;">${segment}弾 - ${frame === 'normal' ? '通常枠' : 'R枠'}</h2>`;

            Object.values(grouped).forEach(provider => {
              html += `<div class="section">`;
              html += `<div class="provider-name">${provider.name}</div>`;
              html += `<div class="card-list">`;

              provider.cards.forEach(card => {
                html += `
                  <div class="card">
                    <div class="position">位置 ${card.position}</div>
                    <p><strong>${card.idol || '未登録'}</strong></p>
                    <p>${card.cardName || '---'}</p>
                    ${card.cardId ? `<p><small>ID: ${card.cardId}</small></p>` : ''}
                    ${card.imageUrl ? `<img src="${card.imageUrl}" alt="${card.cardName}">` : ''}
                    ${card.memo ? `<p style="font-size:0.9em;color:#555;">メモ: ${card.memo}</p>` : ''}
                  </div>`;
              });

              html += `</div></div>`;
            });

            resultDiv.innerHTML = html || "<p>該当データがありません</p>";
          }
        });
      } catch(e) {
        resultDiv.innerHTML = "<p style='color:red;'>エラー：スプレッドシートの読み込みに失敗しました</p>";
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
